onboarding = false

[[keys.command]]
key = "prefix+a"
type = "plugin_action"
command = "jt.command-palette.open"
description = "command palette (fzf)"

[[keys.command]]
key = "prefix+s"
type = "shell"
command = "herdr agent start claude-$(date +%s%N) --split right --focus -- claude"
description = "縦分割してClaude Code起動"

[[keys.command]]
key = "prefix+d"
type = "shell"
command = "herdr agent start claude-$(date +%s%N) --split down --focus -- claude"
description = "横分割してClaude Code起動"

[theme]
name = "tokyo-night"
auto_switch = false

[ui.sound]
enabled = false

[theme.custom]
panel_bg = "#1c1e26"
text = "#d5d8da"
accent = "#e95678"
overlay0 = "#666666"
overlay1 = "#6c6f93"
red = "#e95678"
green = "#29d398"
yellow = "#fab795"
peach = "#fab795"
mauve = "#ee64ac"
blue = "#26bbd9"
teal = "#59e1e3"

[ui]
agent_panel_sort = "spaces"
