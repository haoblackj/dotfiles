onboarding = false

[[keys.command]]
key = "prefix+a"
type = "plugin_action"
command = "jt.command-palette.open"
description = "command palette (fzf)"

[[keys.command]]
key = "prefix+e"
type = "plugin_action"
command = "local.equalize-splits.equalize"
description = "現在のタブのペイン幅を均等化"

[[keys.command]]
key = "prefix+s"
type = "shell"
command = "herdr agent start claude-$(date +%s%N) --split right --focus -- claude"
description = "縦分割してClaude Code起動"

[[keys.command]]
key = "prefix+d"
type = "shell"
command = "herdr agent start claude-$(date +%s%N) --split down --focus -- claude"
description = "横分割してClaude Code起動"

[[keys.command]]
key = "prefix+t"
type = "shell"
command = "herdr tab create > /tmp/herdr-newtab-$$.json && T=$(jq -r .result.tab.tab_id /tmp/herdr-newtab-$$.json) && P=$(jq -r .result.root_pane.pane_id /tmp/herdr-newtab-$$.json) && herdr tab focus $T && herdr pane run $P claude && rm -f /tmp/herdr-newtab-$$.json"
description = "話題ごとに新規タブを作ってClaude Code起動"

[theme]
name = "tokyo-night"
auto_switch = false

[ui.sound]
enabled = false

[theme.custom]
panel_bg = "#1c1e26"
text = "#d5d8da"
accent = "#e95678"
overlay0 = "#666666"
overlay1 = "#6c6f93"
red = "#e95678"
green = "#29d398"
yellow = "#fab795"
peach = "#fab795"
mauve = "#ee64ac"
blue = "#26bbd9"
teal = "#59e1e3"

[ui]
agent_panel_sort = "spaces"
right_click_passthrough_modifier = "ctrl"

[experimental]
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["claude", "codex"]
cjk_ime_cursor_shape = "steady_block"

# herdr-file-viewer: prefix+f で split 起動
[[keys.command]]
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"
description = "Open file viewer in split pane"

# herdr-file-viewer: prefix+shift+f でタブ起動
[[keys.command]]
key = "prefix+shift+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer-tab --plugin herdr-file-viewer"
description = "Open file viewer in new tab"

# herdr-plugin-hunk: prefix+h で worktree diff
[[keys.command]]
key = "prefix+h"
type = "shell"
command = "herdr plugin action invoke hunk.diff.worktree-split"
description = "Open worktree diff in split pane"
