# WezTerm からの移行設定
# 元: dot_wezterm.lua

# 設定ファイル変更を自動で反映
live_config_reload = true

# カラースキーム (Horizon Dark, WezTermで使用していた配色を移植)
general.import = ["~/AppData/Roaming/alacritty/horizon_dark.toml"]

# IME(日本語入力)は明示設定不要、Windows側で自動的に有効になる(WezTermのuse_ime=trueに相当)

[window]
opacity = 0.8
# WezTermの window_decorations = "INTEGRATED_BUTTONS|RESIZE" に近い設定
# (Alacrittyには同一の選択肢はないため、通常のタイトルバー表示にしている)
decorations = "full"
dynamic_title = true

[font]
size = 16.0

[font.normal]
family = "Firge35Nerd Console"
style = "Medium"

[font.bold]
family = "Firge35Nerd Console"
style = "Bold"

[font.italic]
family = "Firge35Nerd Console"
style = "Italic"

# WSL (Ubuntu) を直接起動する設定
# WezTermの default_prog に相当
[shell]
program = "wsl.exe"
args = [
    "--distribution",
    "Ubuntu",
    "--cd",
    "/home/yagu001",
    "--exec",
    "/bin/zsh",
    "-l",
]

[mouse]
# 右クリックでペースト (WezTermのmouse_bindingsに相当)
bindings = [
    { mouse = "Right", action = "Paste" },
]

[keyboard]
bindings = [
    # Alt+Shift+F でフルスクリーン切り替え
    { key = "F", mods = "Alt|Shift", action = "ToggleFullscreen" },
    # Ctrl+Shift+X で Vi(コピー)モード切り替え (WezTermのCopy Modeに相当)
    { key = "X", mods = "Control|Shift", action = "ToggleViMode" },
    # Ctrl+Shift+V でクリップボードからペースト
    { key = "V", mods = "Control|Shift", action = "Paste" },
]

[cursor]
style = { shape = "Block", blinking = "On" }
